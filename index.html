function Tag({c,bg,children}){
  return h("span",{style:{fontSize:10,color:c,background:bg,borderRadius:20,padding:"2px 7px",fontWeight:600}},children);
}
function FL({label,children}){
  return h("div",null,h("label",{style:S.formLabel},label),children);
}
function ComboSelect({value,onChange,options,placeholder}){
  const [custom,setCustom]=useState(false);
  const known=options.includes(value)||value==="";
  if(custom||(!known&&value!=="")){
    return h("div",{style:{display:"flex",gap:6}},
      h("input",{style:{...S.inp,flex:1},value,onChange:e=>onChange(e.target.value),placeholder}),
      h("button",{style:S.cancelSmall,onClick:()=>{onChange("");setCustom(false);}},"\u2715")
    );
  }
  return h("select",{style:S.inp,value,onChange:e=>e.target.value==="__outro__"?setCustom(true):onChange(e.target.value)},
    options.map(o=>h("option",{key:o,value:o},o||("— "+placeholder+" —"))),
    h("option",{value:"__outro__"},"Outra (escrever)…")
  );
}

        h("div",{style:S.formSecTitle},"Dados"),
        h("div",{style:S.formRow2},
          groupA&&h(FL,{label:"Marca de Café"},h(ComboSelect,{value:form.marcaCafe,onChange:v=>f("marcaCafe",v),options:MARCAS_CAFE,placeholder:"Selecionar marca"})),
          !groupA&&h(FL,{label:"País"},h("input",{style:S.inp,value:form.pais,onChange:e=>f("pais",e.target.value),placeholder:"ex: Portugal"})),
          h(FL,{label:"Embaladora"},h(ComboSelect,{value:form.embaladora,onChange:v=>f("embaladora",v),options:EMBALADORAS,placeholder:"Selecionar embaladora"})),
          h(FL,{label:"Impressor"},h("input",{style:S.inp,value:form.impressor,onChange:e=>f("impressor",e.target.value),placeholder:"ex: emba"})),
          isSeries&&h(FL,{label:"Nº Pacotes"},h("input",{style:S.inp,value:form.nrPacotes,onChange:e=>f("nrPacotes",e.target.value),placeholder:"ex: 3"})),
          h(FL,{label:"Dimensões"},h("input",{style:S.inp,value:form.dimensoes,onChange:e=>f("dimensoes",e.target.value),placeholder:"80mm x 40mm"})),
          !isSeries&&h(FL,{label:"Peso"},h("input",{style:S.inp,value:form.peso,onChange:e=>f("peso",e.target.value),placeholder:"ex: 7/8g"}))
        )
      ),
      h("div",{style:S.formSec},
        h("div",{style:S.formSecTitle},"Características Físicas"),
        h("div",{style:S.formRow3},
          h(FL,{label:"Género"},h("select",{style:S.inp,value:form.genero,onChange:e=>f("genero",e.target.value)},GENEROS.map(g=>h("option",{key:g},g)))),
          h(FL,{label:"Eixo Rotação"},h("select",{style:S.inp,value:form.eixo,onChange:e=>f("eixo",e.target.value)},EIXOS.map(x=>h("option",{key:x},x)))),
          h(FL,{label:"Fecho"},h("select",{style:S.inp,value:form.fecho,onChange:e=>f("fecho",e.target.value)},FECHOS.map(fc=>h("option",{key:fc},fc))))
        )
      ),
      h("div",{style:S.formSec},
        h("div",{style:S.formSecTitle},"Imagens"),
        h("div",{style:S.formRow2},
          h(FL,{label:"Imagem Frente"},h(ImgUpload,{side:"frente",img:form.imagemFrente,onChange:e=>handleImage("frente",e),onRemove:()=>f("imagemFrente",null)})),
          h(FL,{label:"Imagem Verso"},h(ImgUpload,{side:"verso",img:form.imagemVerso,onChange:e=>handleImage("verso",e),onRemove:()=>f("imagemVerso",null)}))
        )
      ),
      h("div",{style:S.formActions},
        h("button",{style:S.cancelBtn,onClick:onCancel},"Cancelar"),
        h("button",{style:{...S.saveBtn,opacity:saving?.9:1},onClick:onSave,disabled:saving},saving?"A guardar…":(isEdit?"💾 Guardar":"✚ Adicionar"))
      )
    )
  );
}

// ── DETAIL ───────────────────────────────────────────────────────────────────
function DetailView({packet,imageFlip,setImageFlip,onEdit,onDelete}){
  const [confirmDel,setConfirmDel]=useState(false);
  const color=GRUPOS[packet.tipo]?.color||"#555";
  const light=GRUPOS[packet.tipo]?.light||"#eee";
  const img=imageFlip==="frente"?packet.imagemFrente:packet.imagemVerso;
  const fields=[
    ["ID",packet.id],["Nome",packet.nome],
    packet.marcaCafe&&["Marca de Café",packet.marcaCafe],
    packet.pais&&["País",packet.pais],
    packet.embaladora&&["Embaladora",packet.embaladora],
    packet.impressor&&["Impressor",packet.impressor],
    packet.nrPacotes&&["Nº Pacotes",packet.nrPacotes],
    packet.dimensoes&&["Dimensões",packet.dimensoes],
    packet.peso&&["Peso",packet.peso],
    ["Género",packet.genero],["Eixo Rotação",packet.eixo],["Fecho",packet.fecho],
  ].filter(Boolean);
  return h("div",{style:S.detailWrap},
    h("div",{style:S.detailImgPanel},
      h("div",{style:{...S.detailImgBox,background:img?"#111":"#F5F5F5"}},
        img?h("img",{src:img,alt:imageFlip,style:{...S.detailImgEl,cursor:"zoom-in"},onClick:()=>window.openLightbox(img)}):h("span",{style:{fontSize:56}},"🍬")
      ),
      h("div",{style:S.imgToggle},
        h("button",{style:{...S.imgTogBtn,...(imageFlip==="frente"?{background:color,color:"#fff"}:{})},onClick:()=>setImageFlip("frente")},"Frente"),
        h("button",{style:{...S.imgTogBtn,...(imageFlip==="verso"?{background:color,color:"#fff"}:{})},onClick:()=>setImageFlip("verso")},"Verso")
      ),
      h("div",{style:{textAlign:"center",marginTop:6,fontSize:11,color:"#aaa"}},
        imageFlip==="frente"?(packet.imagemFrente?"✓ Imagem da frente":"Sem imagem de frente"):(packet.imagemVerso?"✓ Imagem do verso":"Sem imagem de verso")
      )
    ),
    h("div",{style:S.detailInfo},
      h("div",{style:{...S.detailBadge,background:light,color}},packet.tipo+(packet.subcat?" · "+packet.subcat:"")),
      h("div",{style:S.detailId},packet.id),
      h("div",{style:S.detailNome},packet.nome||h("em",{style:{color:"#ccc"}},"Sem nome")),
      h("div",{style:S.fieldsGrid},fields.map(([k,v])=>v?h("div",{key:k,style:S.fieldItem},h("div",{style:S.fieldKey},k),h("div",{style:S.fieldVal},v)):null)),
      h("div",{style:S.detailActions},
        h("button",{style:S.editBtn,onClick:onEdit},"✏️ Editar"),
        !confirmDel
          ?h("button",{style:S.delBtn,onClick:()=>setConfirmDel(true)},"🗑 Eliminar")
          :h("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
              h("span",{style:{fontSize:12,color:"#c0392b"}},"Confirmar?"),
              h("button",{style:S.delBtnOk,onClick:onDelete},"Sim"),
              h("button",{style:S.cancelSmall,onClick:()=>setConfirmDel(false)},"Não")
            )
      )
    )
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [packets,setPackets]=useState([]);
  const [ready,setReady]=useState(false);
  const [view,setView]=useState("home");
  const [activeTipo,setActiveTipo]=useState(null);
  const [activeSubcat,setActiveSubcat]=useState(null);
  const [selected,setSelected]=useState(null);
  const [form,setForm]=useState(emptyForm());
  const [editId,setEditId]=useState(null);
  const [editFireId,setEditFireId]=useState(null);
  const [search,setSearch]=useState("");
  const [toast,setToast]=useState(null);
  const [saving,setSaving]=useState(false);
  const [imageFlip,setImageFlip]=useState("frente");
  const nextSeq=useRef(1);

  // Wait for Firebase module to load, then subscribe
  useEffect(()=>{
    function init(){
      const fb=window._firebase;
      const unsub=fb.onSnapshot(fb.col(),(snap)=>{
        const docs=snap.docs.map(d=>({...d.data(),_fireId:d.id}));
        setPackets(docs);
        nextSeq.current=docs.length+10;
        setReady(true);
        document.getElementById("loading").style.display="none";
      });
      return unsub;
    }
    if(window._firebaseReady){
      const unsub=init();
      return ()=>unsub();
    } else {
      const handler=()=>{const unsub=init(); window._unsubPCTs=unsub;};
      window.addEventListener("firebaseReady",handler);
      return ()=>window.removeEventListener("firebaseReady",handler);
    }
  },[]);

  const showToast=m=>{setToast(m);setTimeout(()=>setToast(null),2400);};
  const goHome=()=>{setView("home");setActiveTipo(null);setActiveSubcat(null);};
  const goTipo=tipo=>{
    const subs=subcatsFor(tipo);
    if(subs.length===0){setActiveTipo(tipo);setActiveSubcat("");setSearch("");setView("list");}
    else{setActiveTipo(tipo);setActiveSubcat(null);setView("subcats");}
  };
  const goList=(tipo,sub)=>{setActiveTipo(tipo);setActiveSubcat(sub);setSearch("");setView("list");};
  const goDetail=p=>{setSelected(p);setImageFlip("frente");setView("detail");};
  const openAdd=()=>{
    const ma=new Date().toISOString().slice(2,4)+String(new Date().getMonth()+1).padStart(2,"0");
    const f=emptyForm(activeTipo,activeSubcat||subcatsFor(activeTipo)[0]||"");
    f.id=makeId(activeTipo,nextSeq.current++,ma);
    setForm(f);setEditId(null);setEditFireId(null);setView("form");
  };
  const openEdit=p=>{setForm({...p});setEditId(p.id);setEditFireId(p._fireId);setView("form");};
  const ff=(k,v)=>setForm(fm=>({...fm,[k]:v}));
  const handleImage=(side,e)=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>setForm(f=>({...f,[side==="frente"?"imagemFrente":"imagemVerso"]:ev.target.result}));
    r.readAsDataURL(file);
  };

  const saveForm=async()=>{
    if(!form.id.trim()){showToast("O ID é obrigatório.");return;}
    setSaving(true);
    try{
      const {_fireId,...data}=form;
      if(editFireId){
        await window._firebase.upd(editFireId,data);
        showToast("✓ Pacote atualizado!");
      } else {
        await window._firebase.add(data);
        showToast("✓ Pacote adicionado!");
      }
      setView(editFireId?"detail":"list");
    } catch(e){
      showToast("Erro ao guardar: "+e.message);
    }
    setSaving(false);
  };

  const deletePacket=async(fireId)=>{
    try{
      await window._firebase.del(fireId);
      setView("list");
      showToast("Pacote eliminado.");
    } catch(e){
      showToast("Erro ao eliminar: "+e.message);
    }
  };

  // Keep selected in sync with live packets
  useEffect(()=>{
    if(selected){
      const updated=packets.find(p=>p._fireId===selected._fireId);
      if(updated)setSelected(updated);
    }
  },[packets]);

  const listPackets=packets.filter(p=>
    p.tipo===activeTipo&&(activeSubcat===""||p.subcat===activeSubcat)&&
    (!search||[p.id,p.nome,p.marcaCafe||""].some(v=>(v||"").toLowerCase().includes(search.toLowerCase())))
  );
  const totalByCat=t=>packets.filter(p=>p.tipo===t).length;
  const totalBySub=(t,s)=>packets.filter(p=>p.tipo===t&&p.subcat===s).length;

  // ─ HEADER ─
  const header=h("header",{style:S.header},
    h("div",{style:S.headerInner},
      h("div",{style:S.brand,onClick:goHome},
        h("span",{style:{fontSize:28}},"🍬"),
        h("div",null,h("div",{style:S.brandTitle},"PCTs"),h("div",{style:S.brandSub},"Pacotes de Açúcar"))
      ),
      h("div",{style:S.hStats},
        ...Object.keys(GRUPOS).map(t=>h("div",{key:t,style:S.hStat,onClick:()=>goTipo(t)},
          h("div",{style:{...S.hStatVal,color:GRUPOS[t].color}},totalByCat(t)),
          h("div",{style:S.hStatLbl},t)
        )),
        h("div",{style:S.hStat},h("div",{style:{...S.hStatVal,color:"#5D4037"}},packets.length),h("div",{style:S.hStatLbl},"Total"))
      )
    ),
    view!=="home"&&h("div",{style:S.bc},
      h("span",{style:S.bcLink,onClick:goHome},"Início"),
      activeTipo&&[h("span",{key:"s1",style:S.bcSep},"›"),h("span",{key:"s2",style:view==="subcats"?S.bcCur:S.bcLink,onClick:()=>setView("subcats")},activeTipo)],
      activeSubcat&&[h("span",{key:"s3",style:S.bcSep},"›"),h("span",{key:"s4",style:view==="list"?S.bcCur:S.bcLink,onClick:()=>setView("list")},activeSubcat)],
      view==="detail"&&selected&&[h("span",{key:"s5",style:S.bcSep},"›"),h("span",{key:"s6",style:S.bcCur},selected.id)],
      view==="form"&&[h("span",{key:"s7",style:S.bcSep},"›"),h("span",{key:"s8",style:S.bcCur},editId?"Editar":"Novo")]
    )
  );

  // ─ HOME ─
  const homeView=h("div",null,
    h("div",{style:S.secTitle},"Categorias"),
    h("div",{style:S.grpLabel},h("span",{style:{...S.grpDot,background:"#E65100"}}),"Séries, Individuais & Adoçantes"),
    h("div",{style:S.tipoGrid},["Séries","Individuais","Adoçantes"].map(t=>
      h("div",{key:t,className:"card",style:{...S.tipoCard,borderTop:`4px solid ${GRUPOS[t].color}`,background:GRUPOS[t].light},onClick:()=>goTipo(t)},
        h("div",{style:{fontSize:28,marginBottom:6}},ICONS[t]),
        h("div",{style:{fontSize:14,fontWeight:"bold",color:GRUPOS[t].color,marginBottom:3}},t),
        h("div",{style:{fontSize:12,color:"#888"}},totalByCat(t)+" pacote"+(totalByCat(t)!==1?"s":"")),
        h("div",{style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:18,fontWeight:"bold",color:GRUPOS[t].color}},"→")
      )
    )),
    h("div",{style:{...S.grpLabel,marginTop:24}},h("span",{style:{...S.grpDot,background:"#0D47A1"}}),"Origens Especiais"),
    h("div",{style:S.tipoGrid},["Comp. Aéreas","Mc Donalds","Hotéis"].map(t=>
      h("div",{key:t,className:"card",style:{...S.tipoCard,borderTop:`4px solid ${GRUPOS[t].color}`,background:GRUPOS[t].light},onClick:()=>goTipo(t)},
        h("div",{style:{fontSize:28,marginBottom:6}},ICONS[t]),
        h("div",{style:{fontSize:14,fontWeight:"bold",color:GRUPOS[t].color,marginBottom:3}},t),
        h("div",{style:{fontSize:12,color:"#888"}},totalByCat(t)+" pacote"+(totalByCat(t)!==1?"s":"")),
        h("div",{style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:18,fontWeight:"bold",color:GRUPOS[t].color}},"→")
      )
    ))
  );

  // ─ SUBCATS ─
  const subcatView=activeTipo&&h("div",null,
    h("div",{style:S.pageTitle},activeTipo),
    h("div",{style:S.subcatGrid},subcatsFor(activeTipo).map(sub=>{
      const color=SUBCAT_COLORS[sub]||"#555";
      return h("div",{key:sub,className:"card",style:{...S.subcatCard,borderLeft:`5px solid ${color}`},onClick:()=>goList(activeTipo,sub)},
        h("div",null,h("div",{style:{fontSize:14,fontWeight:"bold",color}},sub),h("div",{style:{fontSize:11,color:"#aaa",margin:"3px 0"}},totalBySub(activeTipo,sub)+" pacote"+(totalBySub(activeTipo,sub)!==1?"s":""))),
        h("div",{style:{fontSize:16,fontWeight:"bold",color}},"→")
      );
    }))
  );

  // ─ LIST ─
  const listView=h("div",null,
    h("div",{style:S.listHeader},
      h("div",null,
        h("div",{style:S.pageTitle},activeTipo+(activeSubcat?" · "+activeSubcat:"")),
        h("div",{style:S.listCount},listPackets.length+" pacote"+(listPackets.length!==1?"s":""))
      ),
      h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}},
        h("div",{style:S.searchWrap},
          h("span",{style:{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:12,opacity:.5}},"🔍"),
          h("input",{style:S.searchIn,placeholder:"Pesquisar…",value:search,onChange:e=>setSearch(e.target.value)}),
          search&&h("button",{style:S.clearX,onClick:()=>setSearch("")},"✕")
        ),
        h("button",{style:S.addBtn,onClick:openAdd},"+ Novo")
      )
    ),
    listPackets.length===0&&h("div",{style:S.empty},h("div",{style:{fontSize:44}},"🫙"),h("div",null,"Nenhum pacote aqui ainda."),h("button",{style:S.addBtn,onClick:openAdd},"Adicionar o primeiro")),
    h("div",{style:S.listGrid},listPackets.map(p=>{
      const img=p.imagemFrente||p.imagemVerso;
      const color=SUBCAT_COLORS[p.subcat]||"#888";
      return h("div",{key:p._fireId||p.id,className:"row",style:S.row,onClick:()=>goDetail(p)},
        h("div",{style:{...S.rowThumb,background:img?"#000":"#F5F5F5"}},img?h("img",{src:img,alt:"",style:{...S.rowThumbImg,cursor:"zoom-in"},onClick:e=>{e.stopPropagation();window.openLightbox(img);}}):h("span",{style:{fontSize:22}},"🍬")),
        h("div",{style:S.rowBody},
          h("div",{style:S.rowId},p.id),
          h("div",{style:S.rowName},p.nome||h("em",{style:{color:"#aaa"}},"Sem nome")),
          h("div",{style:S.rowMeta},
            p.marcaCafe&&h(Tag,{key:"mc",c:"#C62828",bg:"#FFEBEE"},p.marcaCafe),
            p.pais&&h(Tag,{key:"pais",c:"#1565C0",bg:"#E3F2FD"},p.pais),
            h(Tag,{key:"gen",c:color,bg:"#F5F5F5"},p.genero)
          )
        ),
        h("div",{style:S.rowRight},
          p.dimensoes&&h("div",{style:{fontSize:10,color:"#aaa"}},p.dimensoes),
          p.nrPacotes&&h("div",{style:{fontSize:12,color:"#8D6E63",fontWeight:600}},"×"+p.nrPacotes),
          p.peso&&h("div",{style:{fontSize:12,color:"#8D6E63",fontWeight:600}},p.peso)
        )
      );
    }))
  );

  return h("div",{style:S.app},
    header,
    h("main",{style:S.main},
      view==="home"&&homeView,
      view==="subcats"&&subcatView,
      view==="list"&&listView,
      view==="detail"&&selected&&h(DetailView,{packet:selected,imageFlip,setImageFlip,onEdit:()=>openEdit(selected),onDelete:()=>deletePacket(selected._fireId)}),
      view==="form"&&h(PacketForm,{form,f:ff,isEdit:!!editId,onSave:saveForm,onCancel:()=>setView(editId?"detail":"list"),handleImage,saving})
    ),
    saving&&h("div",{style:S.saving},"☁️ A guardar…"),
    toast&&h("div",{style:S.toast},toast)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>

<div id="pcts-lightbox" onclick="closeLightbox()">
  <button id="pcts-lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="pcts-lightbox-img" src="" alt="zoom" onclick="event.stopPropagation()"/>
  <div id="pcts-lightbox-hint">Toque fora para fechar · Junte/afaste os dedos para zoom</div>
</div>
<script>
function openLightbox(src){
  document.getElementById("pcts-lightbox-img").src=src;
  document.getElementById("pcts-lightbox").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeLightbox(){
  document.getElementById("pcts-lightbox").classList.remove("open");
  document.getElementById("pcts-lightbox-img").src="";
  document.body.style.overflow="";
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeLightbox();});
</script>
</body>
</html>
